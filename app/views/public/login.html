<div class="public-wrap" ng-controller="LoginController as vm">
    <div class="public-card">
        <div class="public-left">
            <div class="public-brand">
                <div class="public-logo"></div>
                <div>Pharmly</div>
            </div>

            <h1 class="public-title">Welcome back</h1>
            <p class="public-subtitle">Login to access the admin dashboard.</p>
        </div>

        <div class="public-right">
            <h2 class="auth-title">Admin Login</h2>

            <div class="form-row">
                <label class="label">Email</label>
                <input class="input" type="email" placeholder="admin@pharmly.com" ng-model="vm.email">
            </div>

            <div class="form-row">
                <label class="label">Password</label>
                <input class="input" type="password" placeholder="••••••••" ng-model="vm.password">
            </div>
            <div class="auth-actions">
                <button class="btn btn-primary" type="button" ng-click="vm.login()">Login</button>
                <a class="btn btn-ghost" href="#!/">Back</a>
            </div>
            <div class="helper" ng-if="vm.error">{{ vm.error }}</div>
        </div>
    </div>
</div>
