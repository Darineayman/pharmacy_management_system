<!doctype html>
<html ng-app="patientRegisterApp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Registration</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <link rel="stylesheet" href="../views/styles/signup.css" />
  </head>
  <body ng-controller="PatientRegisterController">
    <div class="container">
      <div class="card">
        <h3>User Registration Form</h3>

        <form name="patientForm" ng-submit="onSubmit()" novalidate>
          <div class="form-section">
            <div class="form-column">
              <label>Full Name</label>
              <input type="text" ng-model="formData.name" required />

              <label>Date of Birth</label>
              <input type="date" ng-model="formData.dob" required />

              <label>Phone Number</label>
              <input type="number" ng-model="formData.mobile" required />

              <label>Gender</label>
              <div class="radio-group">
                <label
                  ><input
                    type="radio"
                    ng-model="formData.gender"
                    value="female"
                    required
                  />
                  Female</label
                >
                <label
                  ><input
                    type="radio"
                    ng-model="formData.gender"
                    value="male"
                    required
                  />
                  Male</label
                >
              </div>

              <label>Email</label>
              <input type="email" ng-model="formData.email" required />

              <label>Username</label>
              <input type="text" ng-model="formData.username" required />

              <label>Password</label>
              <input type="password" ng-model="formData.password" required />
            </div>

            <div class="form-column">
              <label>Emergency Contact Name</label>
              <input
                type="text"
                ng-model="formData.EmergencyContact_Name"
                required
              />

              <label>Relation To You</label>
              <select ng-model="formData.EmergencyContact_Relation" required>
                <option value="" disabled selected>Select Relation</option>
                <option value="wife">Wife</option>
                <option value="husband">Husband</option>
                <option value="child">Child</option>
              </select>

              <label>Emergency Phone Number</label>
              <input
                type="number"
                ng-model="formData.EmergencyContact_MobileNumber"
                required
              />
            </div>
          </div>

          <button
            class="submit-btn"
            type="submit"
            ng-disabled="!isFormComplete()"
          >
            {{ isFormComplete() ? 'Submit' : 'Please fill all fields' }}
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
