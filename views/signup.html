<!DOCTYPE html>
<html ng-app="patientRegisterApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Registration</title>

  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <link rel="stylesheet" href="../views/styles/signup.css" />
</head>

<body ng-controller="PatientRegisterController">
  <div class="card" >
    <h3>Sign Up</h3>

    <form name="patientForm" ng-submit="onSubmit()" novalidate>
      <div class="form-section">
        <label>Full Name</label>
        <input type="text" ng-model="formData.name" placeholder="your name" required />

        <label>Phone Number</label>
        <input type="number" ng-model="formData.mobile" placeholder="0123456789" required />

        <label>Email</label>
        <input type="email" ng-model="formData.email" placeholder="you@example.com" required />

        <label>Password</label>
        <input type="password" ng-model="formData.password" placeholder="********" required />

        <label>Confirm Password</label>
        <input type="password" ng-model="formData.confirmPassword" placeholder="********" required />
        <span class="warning" ng-show="formData.confirmPassword && formData.password !== formData.confirmPassword">
          Passwords do not match!
        </span>
      </div>

      <button
        class="submit-btn"
        type="submit"
        ng-disabled="!isFormComplete() || formData.password !== formData.confirmPassword"
      >
        {{ isFormComplete() && formData.password === formData.confirmPassword ? 'Submit' : 'Please fill all fields correctly' }}
      </button>
    </form>
  </div>

  <script>
    var app = angular.module('patientRegisterApp', []);

    app.controller('PatientRegisterController', ['$scope', '$window', function($scope, $window) {
      $scope.formData = {
        name: '',
        mobile: '',
        email: '',
        password: '',
        confirmPassword: '',
        gender: ''
      };

      $scope.isFormComplete = function() {
        const fd = $scope.formData;
        return fd.name && fd.mobile && fd.email && fd.password && fd.confirmPassword && fd.gender;
      };

      $scope.onSubmit = function() {
        if (!$scope.isFormComplete()) {
          alert("Please fill all fields");
          return;
        }

        if ($scope.formData.password !== $scope.formData.confirmPassword) {
          alert("Passwords do not match");
          return;
        }

        console.log("Form data:", $scope.formData);
        alert("Registration Successful!");

        // Reset form
        $scope.formData = {
          name: '',
          mobile: '',
          email: '',
          password: '',
          confirmPassword: '',
          gender: ''
        };
      };
    }]);
  </script>
</body>
</html>
