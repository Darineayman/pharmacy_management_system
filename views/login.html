<!doctype html>
<html ng-app="loginApp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PillStack Login</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <link rel="stylesheet" href="../views/styles/login.css" />
  </head>
  <body ng-controller="LoginController">
    <div class="container">
      <div class="left">
        <img src="../UI/Images/pillstackLogo.png" alt="Logo" />
        <h1>
          Your Health, <br />
          One Click Away
        </h1>
        <p>
          "Join our platform for access to top-tier doctors and hassle-free
          appointments. Your wellness journey starts here."
        </p>

        <div class="avatar-group">
          <img src="https://bit.ly/ryan-florence" alt="Ryan" />
          <img src="https://bit.ly/sage-adebayo" alt="Segun" />
          <img src="https://bit.ly/kent-c-dodds" alt="Kent" />
          <img src="https://bit.ly/prosper-baba" alt="Prosper" />
          <img src="https://bit.ly/code-beast" alt="Christian" />
          <span>Join 10,000+ Users</span>
        </div>
      </div>

      <div class="right">
        <div class="login-box">
          <h2>Log in to your account</h2>
          <p>
            Don't have an account?
            <a ng-click="navigate('patient-register')">Sign up</a>
          </p>

          <form ng-submit="handleSubmit()">
            <input
              type="text"
              placeholder="Username"
              ng-model="username"
              required
            />
            <input
              type="password"
              placeholder="Password"
              ng-model="password"
              required
            />

            <div class="checkbox-row">
              <label
                ><input type="checkbox" ng-model="rememberMe" /> Remember
                me</label
              >
              <a ng-click="forgotPassword()">Forgot password?</a>
            </div>

            <button type="submit">Sign in</button>

            <div class="divider-row">
              <hr />
              <span>Are you a Pharmacist?</span>
              <hr />
            </div>

            <p style="text-align: center">
              <a ng-click="navigate('pharmacist-register')"
                >Register as a pharmacist</a
              >
            </p>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
