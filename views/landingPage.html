<!doctype html>
<html ng-app="landingApp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PillStack Landing Page</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <link rel="stylesheet" href="../views/styles/landingPage.css" />
  </head>

  <body ng-controller="LandingController">
    <div class="header">
      <div class="logo">
        <img src="../views/assets/logo.png" alt="PillStack Logo" />
      </div>
      <div class="nav-buttons">
        <button class="login-btn" ng-click="navigate('login')">Login</button>
        <button class="signup-btn" ng-click="navigate('patient-register')">
          Sign Up
        </button>
      </div>
    </div>

    <div class="hero">
      <div class="hero-text">
        <h1>"Empowering Your Health Journey, One Click Away!"</h1>
        <p>
          Your Trusted Online Clinic & Pharmacy for Convenient Care & Medication
          Solutions.
        </p>
      </div>
      <div class="hero-phone">
        <div class="floating-phone">
          <p>Phone Preview</p>
        </div>
      </div>
    </div>
    <script>
      var app = angular.module("landingApp", []);

      app.controller("LandingController", [
        "$scope",
        "$window",
        function ($scope, $window) {
          $scope.features = [
            "Easy Medicine Ordering",
            "24/7 Online Clinic",
            "Secure Patient Data",
            "Fast Delivery",
            "Health Reminders",
          ];

          $scope.navigate = function (path) {
            // simple simulation of navigation
            alert("Navigate to /" + path);
            // in real AngularJS app, you'd use $location.path('/' + path);
          };
        },
      ]);
    </script>
  </body>
</html>
